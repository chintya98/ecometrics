version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ecometrics-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecometrics
    volumes:
      - ecometrics_pgdata:/var/lib/postgresql/data

volumes:
  ecometrics_pgdata:
